server:
  port: 8866

spring:
  application:
    name: gym-os-api

  # Load DB credentials from application-local.yml (gitignored) so secrets never enter git.
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Validate Supabase-issued JWTs (ES256, verified against the project's JWKS endpoint).
  # No shared secret needed. `sub` = the user's uuid; `aud` = authenticated.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://qgbtrgkiqgccmlqjxxfu.supabase.co/auth/v1/.well-known/jwks.json
          audiences: authenticated

logging:
  level:
    org.hibernate.SQL: debug
