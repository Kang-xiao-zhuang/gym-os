server:
  port: 8866

spring:
  application:
    name: gym-os-api

  # Load DB credentials from application-local.yml (gitignored) so secrets never enter git.
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: debug
